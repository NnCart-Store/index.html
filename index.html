<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f43f5e">

<title>NnCart Full</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
img { background:#eee; }
</style>

</head>

<body class="bg-gray-100">

<div class="bg-red-600 text-white p-4 text-lg font-bold flex justify-between">
  NnCart Store
  <span>🛒 <span id="cartCount">0</span></span>
</div>

<div class="p-3">

<input id="search" placeholder="Search Product..." 
class="border p-2 w-full mb-2 rounded">

<button onclick="startScanner()" 
class="bg-blue-500 text-white p-2 w-full mb-2 rounded">
📷 Scan Barcode
</button>

<div id="scanner" class="mb-3"></div>

<div id="products" class="grid grid-cols-2 gap-3"></div>

<div class="mt-4 bg-white p-3 rounded shadow">
<h2 class="font-bold">Cart (<span id="count">0</span>)</h2>
<div id="cartItems"></div>
<h3 class="mt-2 font-bold">Total: ₹<span id="total">0</span></h3>

<button onclick="openOrder()" 
class="bg-green-500 text-white p-2 w-full mt-2 rounded">
Checkout
</button>
</div>

<div id="orderBox" class="hidden mt-4 bg-white p-3 rounded shadow">

<input id="cName" placeholder="Customer Name" class="border p-2 w-full mb-2">
<input id="mobile" placeholder="Mobile" class="border p-2 w-full mb-2">
<input id="address" placeholder="Address" class="border p-2 w-full mb-2">
<input id="payProof" placeholder="Payment Proof" class="border p-2 w-full mb-2">
<textarea id="desc" placeholder="Description" class="border p-2 w-full mb-2"></textarea>

<h3 class="font-bold">Preview:</h3>
<div id="preview"></div>

<button onclick="submitOrder()" 
class="bg-red-500 text-white p-2 w-full mt-2 rounded">
Submit Order
</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "nncart.firebaseapp.com",
  projectId: "nncart"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 GOOGLE SHEET URL
const SHEET_URL = "https://script.google.com/macros/s/AKfycbw-_c1wmnHBYbYQCtE8pN6MdnJsvrt3-gh_GAuFdsgGgIzHJnQJzIl5W9m4LOQ5f7ht/exec";

// DATA
let allProducts = [];
let cart = [];
let scannerRunning = false;
let qrScanner = null;

// ================= LOAD PRODUCTS =================
async function loadProducts() {
  try{
    const snap = await db.collection("products").get();
    allProducts = snap.docs.map(doc => doc.data());
    renderProducts(allProducts);
  }catch(e){
    alert("❌ Products load error");
  }
}

// ================= RENDER PRODUCTS =================
function renderProducts(list) {

  if(!list.length){
    document.getElementById("products").innerHTML = "No Products";
    return;
  }

  let html = "";

  list.forEach(p => {

    html += `
    <div class="bg-white p-2 rounded shadow">

      <img src="${p["Image URL"] || 'https://via.placeholder.com/150'}"
      class="h-28 w-full object-cover rounded">

      <h3 class="text-sm font-bold mt-1">
      ${p["Product Name"] || "No Name"}
      </h3>

      <p class="text-red-600 font-bold">
      ₹${p["Price"] || 0}
      </p>

      <button onclick='addToCart(${JSON.stringify(p)})'
      class="bg-red-500 text-white w-full mt-1 p-1 rounded">
      Add
      </button>

    </div>`;
  });

  document.getElementById("products").innerHTML = html;
}

// ================= SEARCH =================
document.getElementById("search").oninput = function(e) {
  const v = e.target.value.toLowerCase();

  const filtered = allProducts.filter(p =>
    (p["Product Name"] || "").toLowerCase().includes(v)
  );

  renderProducts(filtered);
};

// ================= CART =================
function addToCart(p) {

  const found = cart.find(i => i["Product Name"] === p["Product Name"]);

  if(found){
    found.qty += 1;
  } else {
    p.qty = 1;
    cart.push(p);
  }

  renderCart();
}

function renderCart(){

  let html = "";
  let totalVal = 0;

  cart.forEach((item,i)=>{

    const price = Number(item["Price"] || 0);
    const qty = item.qty || 1;

    totalVal += price * qty;

    html += `
    <div class="flex justify-between text-sm mb-1">
      ${item["Product Name"]} x${qty}
      <div>
      ₹${price*qty}
      <button onclick="removeItem(${i})">❌</button>
      </div>
    </div>`;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("preview").innerHTML = html;
  document.getElementById("count").innerText = cart.length;
  document.getElementById("cartCount").innerText = cart.length;
  document.getElementById("total").innerText = totalVal;
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

// ================= SCANNER =================
async function startScanner(){

  if(scannerRunning){
    alert("Scanner already running");
    return;
  }

  try{

    scanner.innerHTML = "";
    qrScanner = new Html5Qrcode("scanner");
    scannerRunning = true;

    await qrScanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },

      (code)=>{

        const found = allProducts.find(p => p["Barcode"] == code);

        if(found){
          addToCart(found);
        } else {
          alert("Product not found!");
        }

        stopScanner();
      }
    );

  }catch(e){
    alert("❌ Camera blocked या app support नहीं करता");
    scannerRunning = false;
  }
}

async function stopScanner(){
  try{
    if(qrScanner){
      await qrScanner.stop();
      qrScanner.clear();
      scannerRunning = false;
    }
  }catch(e){}
}

// ================= ORDER =================
function openOrder(){
  document.getElementById("orderBox").classList.remove("hidden");
}

// ================= FIXED SHEET INTEGRATION =================
async function sendToSheet(data){
  try{
    await fetch(SHEET_URL + "?action=addOrder", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        customerName: data["Customer Name"],
        mobile: data["Mobile"],
        address: data["Address"],
        products: data["Products"],
        total: data["Total"],
        paymentProof: data["Payment Proof"],
        description: data["Description"] || "",
        barcodeId: "", 
        price: data["Total"],
        size: "",
        color: "",
        category: "",
        stock: ""
      })
    });
    console.log("Sheet update success");
  }catch(e){
    console.log("Sheet error", e);
  }
}

// ================= SUBMIT =================
async function submitOrder(){

  const name = cName.value.trim();
  const mob = mobile.value.trim();

  if(!name || !mob){
    alert("Name & Mobile required");
    return;
  }

  if(cart.length===0){
    alert("Cart empty");
    return;
  }

  const now = new Date();
  const totalVal = cart.reduce((s,i)=>s + (Number(i.Price||0)*(i.qty||1)),0);

  const data = {
    "Timestamp": now.toISOString(),
    "Customer Name": name,
    "Mobile": mob,
    "Address": address.value,
    "Products": cart.map(i=>i["Product Name"]+" x"+i.qty).join(", "),
    "Total": totalVal,
    "Payment Proof": payProof.value,
    "Description": desc.value,
    "Status": "Pending"
  };

  try{
    await db.collection("orders").add(data);
    await sendToSheet(data);

    alert("Order Success ✅");

    cart = [];
    renderCart();
    document.querySelectorAll("input,textarea").forEach(e=>e.value="");
    document.getElementById("orderBox").classList.add("hidden");

  }catch(e){
    alert("Error ❌");
    console.log(e);
  }
}

// ================= START =================
loadProducts();

</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js')
  .then(() => console.log("Service Worker Registered"));
}
</script>
</body>
</html>
