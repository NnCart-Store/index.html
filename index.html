<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF0000">
    <title>NnCart Full</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        img { background:#f3f4f6; min-height: 120px; }
        .product-card:active { transform: scale(0.98); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #quickOrderBox { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100 pb-24">

    <!-- Header -->
    <header class="bg-[#003399] text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-md">
        <div class="flex flex-col" onclick="location.reload()">
            <h1 class="text-2xl font-black italic tracking-tighter leading-none">NnCart</h1>
            <p class="text-[8px] italic font-medium opacity-90">Sab Kuch... Yahin Se!</p>
        </div>
        <div class="flex items-center gap-4">
            <i class="fa-solid fa-magnifying-glass text-lg cursor-pointer" onclick="document.getElementById('search').focus()"></i>
            <div class="relative cursor-pointer" onclick="toggleCart()">
                <i class="fa-solid fa-cart-shopping text-2xl"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-orange-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold border-2 border-[#003399]">0</span>
            </div>
        </div>
    </header>

    <!-- Search Section -->
    <div class="bg-[#003399] p-3 pb-8 rounded-b-[30px] shadow-lg">
        <div class="relative flex items-center">
            <i class="fa-solid fa-magnifying-glass absolute left-4 text-gray-400"></i>
            <input id="search" oninput="searchProduct()" placeholder="Search for products..." class="w-full p-3 pl-12 rounded-xl outline-none text-sm text-gray-700 shadow-inner">
        </div>
    </div>

    <!-- Category Section -->
    <div class="flex gap-4 overflow-x-auto no-scrollbar p-4 bg-white -mt-4 mx-3 rounded-2xl shadow-sm">
        <div onclick="filterByCategory('Saree')" class="flex flex-col items-center min-w-[65px]">
            <div class="w-14 h-14 rounded-full overflow-hidden border-2 border-blue-50">
                <img src="https://m.media-amazon.com/images/I/71z3uD+6clL._AC_UY1100_.jpg" class="w-full h-full object-cover">
            </div>
            <span class="text-[10px] font-bold mt-1">Shari</span>
        </div>
        <div onclick="filterByCategory('Kurti')" class="flex flex-col items-center min-w-[65px]">
            <div class="w-14 h-14 rounded-full overflow-hidden border-2 border-blue-50">
                <img src="https://m.media-amazon.com/images/I/61vI80lYv+L._AC_UY1100_.jpg" class="w-full h-full object-cover">
            </div>
            <span class="text-[10px] font-bold mt-1">Kurti</span>
        </div>
        <div onclick="filterByCategory('Jeans')" class="flex flex-col items-center min-w-[65px]">
            <div class="w-14 h-14 rounded-full overflow-hidden border-2 border-blue-50">
                <img src="https://5.imimg.com/data5/ANDROID/Default/2021/1/WA/TC/ZZ/27725946/product-500x500.jpg" class="w-full h-full object-cover">
            </div>
            <span class="text-[10px] font-bold mt-1">Jeans</span>
        </div>
        <div onclick="filterByCategory('Shirt')" class="flex flex-col items-center min-w-[65px]">
            <div class="w-14 h-14 rounded-full overflow-hidden border-2 border-blue-50">
                <img src="https://m.media-amazon.com/images/I/71S9O6Ojc6L._AC_UY1100_.jpg" class="w-full h-full object-cover">
            </div>
            <span class="text-[10px] font-bold mt-1">Shirt</span>
        </div>
    </div> 

    <!-- Product Grid -->
    <div id="products" class="grid grid-cols-2 gap-3 p-3 mt-2"></div>

    <!-- Quick Buy Modal -->
    <div id="quickOrderBox" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-black mb-2 text-blue-800 border-b pb-2">ORDER DETAILS</h2>
            <p id="selectedItemName" class="font-bold text-gray-700 mb-4 bg-blue-50 p-3 rounded-xl text-sm"></p>
            <div class="space-y-3">
                <input id="qName" placeholder="आपका नाम" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 ring-blue-500">
                <input id="qMobile" type="tel" placeholder="मोबाइल नंबर" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 ring-blue-500">
                <div class="grid grid-cols-2 gap-2">
                    <input id="qSize" placeholder="Size (L, XL)" class="p-3 bg-gray-50 border rounded-xl outline-none">
                    <input id="qColor" placeholder="Color" class="p-3 bg-gray-50 border rounded-xl outline-none">
                </div>
                <textarea id="qAddress" placeholder="पूरा पता (Full Address)" class="w-full p-3 bg-gray-50 border rounded-xl outline-none h-24 focus:ring-2 ring-blue-500"></textarea>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="closeQuickOrder()" class="flex-1 py-4 font-bold text-gray-400">CLOSE</button>
                <button onclick="confirmQuickOrder()" class="flex-1 py-4 bg-[#FFD700] text-black font-black rounded-xl shadow-lg active:scale-95">CONFIRM ORDER</button>
            </div>
        </div>
    </div>

    <!-- Firebase & Logic -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCH2di4fAKw8vA80Cv8BMobi-v1p0I", 
            authDomain: "nncart.firebaseapp.com",
            projectId: "nncart"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbzp6AZrQOG2CPByIVlmpJmYiPtlreh9tLV8rOIO38T_Q4tM-P09ac9_kb-32DJAQWOz/exec";

        let allProducts = [];

        async function loadProducts() {
            try {
                // Try fetching from Sheet first for latest inventory
                const response = await fetch(SHEET_URL + "?action=getInventory");
                allProducts = await response.json();
                renderProducts(allProducts);
            } catch(e) {
                // Fallback to Firebase
                const snap = await db.collection("products").get();
                allProducts = snap.docs.map(doc => doc.data());
                renderProducts(allProducts);
            }
        }

        function renderProducts(list) {
            let html = "";
            list.forEach(p => {
                // IMAGE FIX: 83001.jpg ke hisab se image mapping sahi ki gayi hai
                const img = p.Image || p["Image URL"] || p.image || 'https://via.placeholder.com/150?text=NnCart';
                const name = p.Name || p["Product Name"] || "New Product";
                const price = p.Price || 0;
                const mrp = p.MRP || (Number(price) + 200);

                html += `
                <div class="bg-white p-2 rounded-2xl shadow-sm flex flex-col border border-gray-100 product-card">
                    <img src="${img}" class="h-32 w-full object-cover rounded-xl mb-1" onerror="this.src='https://via.placeholder.com/150?text=Image+Error'">
                    
                    <div class="flex text-[#FFD700] text-[8px] px-1">
                        <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star-half-stroke"></i>
                    </div>
                    
                    <h3 class="text-[11px] font-bold mt-1 px-1 truncate text-gray-800">${name}</h3>
                    
                    <div class="flex gap-2 items-center px-1 mb-2">
                        <p class="text-red-600 font-black text-sm">₹${price}</p>
                        <p class="text-gray-400 line-through text-[9px]">₹${mrp}</p>
                    </div>

                    <!-- "+ Cart" Button Deleted as requested -->
                    <button onclick='openQuickOrder(${JSON.stringify(p)})' class="w-full bg-[#FFD700] text-black text-[11px] py-2.5 rounded-lg font-black shadow-sm active:scale-95 transition-all">BUY NOW</button>
                </div>`;
            });
            document.getElementById("products").innerHTML = html;
        }

        function searchProduct() {
            const v = document.getElementById("search").value.toLowerCase();
            const filtered = allProducts.filter(p => (p.Name || p["Product Name"] || "").toLowerCase().includes(v));
            renderProducts(filtered);
        }

        function filterByCategory(cat) {
            const filtered = allProducts.filter(p => (p.Category || "").toLowerCase() === cat.toLowerCase());
            renderProducts(filtered);
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }

        function openQuickOrder(p) {
            currentQuickItem = p;
            document.getElementById("selectedItemName").innerText = (p.Name || p["Product Name"]);
            document.getElementById("quickOrderBox").classList.remove("hidden");
        }

        function closeQuickOrder() { document.getElementById("quickOrderBox").classList.add("hidden"); }

        async function confirmQuickOrder() {
            const name = document.getElementById("qName").value;
            const mob = document.getElementById("qMobile").value;
            const addr = document.getElementById("qAddress").value;
            
            if(!name || !mob || !addr) return alert("Please fill all details!");

            const data = {
                "Timestamp": new Date().toLocaleString(),
                "Customer Name": name,
                "Mobile": mob,
                "Address": addr,
                "Product": (currentQuickItem.Name || currentQuickItem["Product Name"]),
                "Size/Color": document.getElementById("qSize").value + " / " + document.getElementById("qColor").value,
                "Total": currentQuickItem.Price,
                "Status": "Pending"
            };

            try {
                // Save to Firebase
                await db.collection("orders").add(data);
                // Send to Google Sheet
                await fetch(SHEET_URL + "?action=placeOrder", { method: "POST", body: JSON.stringify(data) });
                
                alert("Order Success! Hum aapse jaldi sampark karenge. ✅");
                closeQuickOrder();
            } catch(e) {
                alert("Order Error ❌");
            }
        }

        loadProducts();
    </script>

    <!-- Bottom Nav -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around py-3 z-[100] shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <button onclick="location.reload()" class="flex flex-col items-center text-blue-700">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-bold mt-1">HOME</span>
        </button>
        <button onclick="document.getElementById('products').scrollIntoView()" class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-layer-group text-xl"></i>
            <span class="text-[10px] font-bold mt-1">CATEGORIES</span>
        </button>
        <button onclick="alert('No orders yet!')" class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-truck-fast text-xl"></i>
            <span class="text-[10px] font-bold mt-1">ORDERS</span>
        </button>
        <button onclick="alert('Profile Coming Soon')" class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-user text-xl"></i>
            <span class="text-[10px] font-bold mt-1">ACCOUNT</span>
        </button>
    </footer>

</body>
</html>
