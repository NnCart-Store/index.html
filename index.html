<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF0000">
<title>NnCart Full</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
img { background:#eee; }
.product-card:active { transform: scale(0.98); }
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
.line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
#quickOrderBox { transition: all 0.3s ease; }
</style>
</head>
<body class="bg-gray-100 pb-20">

<header class="bg-[#003399] text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-md">
  <div class="flex flex-col" onclick="location.reload()">
      <h1 class="text-2xl font-black italic tracking-tighter leading-none">NnCart</h1>
      <p class="text-[8px] italic font-medium opacity-90">Sab Kuch... Yahin Se!</p>
  </div>
  
  <div class="flex items-center gap-4">
    <i class="fa-solid fa-magnifying-glass text-lg cursor-pointer" onclick="document.getElementById('search').focus()"></i>
    
    <div class="relative cursor-pointer" onclick="toggleCart()">
      <i class="fa-solid fa-cart-shopping text-2xl"></i>
      <span id="cartCount" class="absolute -top-2 -right-2 bg-orange-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold border-2 border-[#003399]">0</span>
    </div>
  </div>
</header>

<div class="bg-[#003399] p-3 pb-8 rounded-b-[30px] shadow-lg">
    <div class="relative flex items-center">
        <i class="fa-solid fa-magnifying-glass absolute left-4 text-gray-400"></i>
        <input id="search" oninput="searchProduct()" placeholder="Search for products..." class="w-full p-3 pl-12 rounded-xl outline-none text-sm text-gray-700 shadow-inner">
        <i class="fa-solid fa-microphone absolute right-4 text-[#003399]"></i>
    </div>
</div>

<div class="px-3 -mt-5 mb-2">
    <div class="w-full bg-gradient-to-r from-orange-500 via-red-600 to-pink-600 rounded-2xl shadow-xl overflow-hidden relative border-2 border-white">
        <div class="p-4 flex justify-between items-center relative z-10">
            <div>
                <h3 class="text-white text-[10px] font-bold tracking-widest uppercase opacity-90">Special Offer</h3>
                <p class="text-white text-2xl font-black italic leading-tight">PRIMEUM BIG SALE <br> <span class="text-yellow-300">LIVE NOW</span></p>
                <div class="mt-2 inline-block bg-white text-red-600 text-[12px] px-4 py-1 rounded-full font-black shadow-lg animate-bounce">
                    UP TO 55% OFF
                </div>
            </div>
            <div class="bg-white/20 p-3 rounded-full backdrop-blur-sm">
                <i class="fa-solid fa-bolt-lightning text-yellow-300 text-4xl animate-pulse"></i>
            </div>
        </div>
    </div>
</div>

<div class="flex gap-4 overflow-x-auto no-scrollbar p-4 bg-white">
    <div onclick="filterByCategory('Saree')" class="flex flex-col items-center min-w-[70px]">
        <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-gray-100 shadow-sm">
            <img src="https://m.media-amazon.com/images/I/71z3uD+6clL._AC_UY1100_.jpg" class="w-full h-full object-cover">
        </div>
        <span class="text-[11px] font-bold mt-1 text-gray-700">Shari</span>
    </div>
    <div onclick="filterByCategory('Kurti')" class="flex flex-col items-center min-w-[70px]">
        <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-gray-100 shadow-sm">
            <img src="https://m.media-amazon.com/images/I/61vI80lYv+L._AC_UY1100_.jpg" class="w-full h-full object-cover">
        </div>
        <span class="text-[11px] font-bold mt-1 text-gray-700">Kurti</span>
    </div>
    <div onclick="filterByCategory('Jeans')" class="flex flex-col items-center min-w-[70px]">
        <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-gray-100 shadow-sm">
            <img src="https://5.imimg.com/data5/ANDROID/Default/2021/1/WA/TC/ZZ/27725946/product-500x500.jpg" class="w-full h-full object-cover">
        </div>
        <span class="text-[11px] font-bold mt-1 text-gray-700">Jeans</span>
    </div>
    <div onclick="filterByCategory('Shirt')" class="flex flex-col items-center min-w-[70px]">
        <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-gray-100 shadow-sm">
            <img src="https://m.media-amazon.com/images/I/71S9O6Ojc6L._AC_UY1100_.jpg" class="w-full h-full object-cover">
        </div>
        <span class="text-[11px] font-bold mt-1 text-gray-700">Shirt</span>
    </div>
</div> 

<div id="products" class="grid grid-cols-2 gap-3 p-3"></div>

<div id="quickOrderBox" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
        <h2 class="text-xl font-black mb-2 text-red-600 border-b pb-2">Buy Now</h2>
        <p id="selectedItemName" class="font-bold text-gray-700 mb-4 bg-gray-100 p-2 rounded-lg text-sm"></p>
        <div class="space-y-3">
            <input id="qName" placeholder="आपका नाम" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
            <input id="qMobile" placeholder="मोबाइल नंबर" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
            <div class="grid grid-cols-2 gap-2">
                <input id="qSize" placeholder="Size (L, XL)" class="p-3 bg-gray-50 border rounded-xl outline-none">
                <input id="qColor" placeholder="Color" class="p-3 bg-gray-50 border rounded-xl outline-none">
            </div>
            <textarea id="qAddress" placeholder="पूरा पता (Full Address)" class="w-full p-3 bg-gray-50 border rounded-xl outline-none h-20"></textarea>
        </div>
        <div class="flex gap-2 mt-6">
            <button onclick="closeQuickOrder()" class="flex-1 py-3 font-bold text-gray-500">Cancel</button>
            <button onclick="confirmQuickOrder()" class="flex-1 py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg border-b-4 border-green-800">Confirm ✅</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔥 CONFIG (Tere pehle wale hi hain)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "nncart.firebaseapp.com",
  projectId: "nncart"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxsZI2CZma2Op53gSJwki7gC9Zs5qZtnpp1_4N3TeerW1s3KO3F7CWGxmO5WXLZs2Dj/exec";

let allProducts = [];
let cart = [];
let scannerRunning = false;
let qrScanner = null;
let currentQuickItem = null; // Buy Now ke liye

async function loadProducts() {
  try{
    const snap = await db.collection("products").get();
    allProducts = snap.docs.map(doc => doc.data());
    renderProducts(allProducts);
  }catch(e){ alert("❌ Products load error"); }
}

function renderProducts(list) {
      list.forEach(p => {
    // Rating aur MRP logic
    const price = p["Price"] || 0;
    const mrp = p["MRP"] || (Number(price) + 100);

    html += `
    <div class="bg-white p-2 rounded-2xl shadow-md flex flex-col border border-gray-100">
      <img src="${p["Image URL"] || 'https://via.placeholder.com/150'}" class="h-28 w-full object-cover rounded-xl">
      
      <div class="flex text-[#FFD700] text-[8px] mt-1">
          <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star-half-stroke"></i>
      </div>

      <h3 class="text-[11px] font-bold mt-1 truncate">${p["Product Name"] || "No Name"}</h3>
      
      <div class="flex gap-2 items-center">
          <p class="text-red-600 font-black text-sm">₹${price}</p>
          <p class="text-gray-400 line-through text-[10px]">₹${mrp}</p>
      </div>

      <div class="grid grid-cols-2 gap-1 mt-2">
          <button onclick='addToCart(${JSON.stringify(p)})' class="bg-gray-100 text-black text-[10px] p-2 rounded-lg font-bold shadow-sm active:scale-95 transition-transform">+ Cart</button>
          <button onclick='openQuickOrder(${JSON.stringify(p)})' class="bg-[#FFD700] text-black text-[10px] p-2 rounded-lg font-bold shadow-sm active:scale-95 transition-transform">BUY NOW</button>
      </div>
    </div>`;
  });


// SEARCH (Tera original logic)
document.getElementById("search").oninput = function(e) {
  const v = e.target.value.toLowerCase();
  const filtered = allProducts.filter(p => (p["Product Name"] || "").toLowerCase().includes(v));
  renderProducts(filtered);
};
// 🔥 Category Filter Logic
function filterByCategory(category) {
    if (category === 'all') {
        renderProducts(allProducts);
    } else {
        const filtered = allProducts.filter(p => 
            (p["Category"] || "").toLowerCase() === category.toLowerCase()
        );
        renderProducts(filtered);
    }
    // Screen ko thoda upar scroll kar dega filter ke baad
    window.scrollTo({ top: 400, behavior: 'smooth' });
}

// CART (Tera original logic)
function addToCart(p) {
  const found = cart.find(i => i["Product Name"] === p["Product Name"]);
  if(found){ found.qty += 1; } else { p.qty = 1; cart.push(p); }
  renderCart();
}

function renderCart(){
  let html = "";
  let totalVal = 0;
  cart.forEach((item,i)=>{
    const price = Number(item["Price"] || 0);
    const qty = item.qty || 1;
    totalVal += price * qty;
    html += `<div class="flex justify-between text-[11px] mb-1 bg-gray-50 p-1 rounded">
      ${item["Product Name"]} x${qty}
      <div>₹${price*qty} <button onclick="removeItem(${i})">❌</button></div>
    </div>`;
  });
  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("preview").innerHTML = html;
  document.getElementById("count").innerText = cart.length;
  document.getElementById("cartCount").innerText = cart.length;
  document.getElementById("total").innerText = totalVal;
}

function removeItem(i){ cart.splice(i,1); renderCart(); }

// SCANNER (Tera original logic)
async function startScanner(){
  if(scannerRunning) return;
  try{
    document.getElementById("scanner").innerHTML = "";
    qrScanner = new Html5Qrcode("scanner");
    scannerRunning = true;
    await qrScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (code)=>{
        const found = allProducts.find(p => p["Barcode"] == code);
        if(found){ addToCart(found); } else { alert("Product not found!"); }
        stopScanner();
    });
  }catch(e){ alert("Camera Error"); scannerRunning = false; }
}

async function stopScanner(){
  if(qrScanner){ await qrScanner.stop(); scannerRunning = false; }
}

// ORDER & BUY NOW FUNCTIONS
function openOrder(){ document.getElementById("orderBox").classList.remove("hidden"); }

function openQuickOrder(p) {
    currentQuickItem = p;
    document.getElementById("selectedItemName").innerText = "Item: " + p["Product Name"];
    document.getElementById("quickOrderBox").classList.remove("hidden");
}
function closeQuickOrder() { document.getElementById("quickOrderBox").classList.add("hidden"); }

async function confirmQuickOrder() {
    const name = qName.value; const mob = qMobile.value; const addr = qAddress.value;
    if(!name || !mob || !addr) return alert("Fill all details!");
    
    const data = {
        "Timestamp": new Date().toISOString(),
        "Customer Name": name,
        "Mobile": mob,
        "Address": addr,
        "Products": currentQuickItem["Product Name"] + " (Size: "+qSize.value+", Color: "+qColor.value+")",
        "Total": currentQuickItem["Price"],
        "Status": "Pending"
    };
    await submitLogic(data);
    closeQuickOrder();
}

// SUBMIT LOGIC (Common for Cart & Buy Now)
async function submitLogic(data) {
    try {
        await db.collection("orders").add(data);
        await fetch(SHEET_URL + "?action=placeOrder", {
          method: "POST",
          body: JSON.stringify(data)
        });
        alert("Order Success ✅");
    } catch(e) { alert("Error ❌"); }
}

async function submitOrder() {
  const name = document.getElementById("cName").value.trim();
  const mob = document.getElementById("mobile").value.trim();
  
  if (!name || !mob || cart.length === 0) {
    return alert("Details bhariye ya cart check karein!");
  }

  const data = {
    "Timestamp": new Date().toISOString(),
    "Customer Name": name,
    "Mobile": mob,
    "Address": document.getElementById("address").value,
    "Products": cart.map(i => i["Product Name"] + " x" + i.qty).join(", "),
    "Total": document.getElementById("total").innerText,
    "Status": "Pending"
  };

  try {
    await db.collection("orders").add(data);
    await fetch(SHEET_URL + "?action=placeOrder", {
      method: "POST",
      body: JSON.stringify(data)
    });
    alert("Order Success ✅");
    cart = [];
    renderCart();
    document.querySelectorAll("input,textarea").forEach(e => e.value = "");
    document.getElementById("orderBox").classList.add("hidden");
  } catch (e) {
    alert("Error ❌");
  }
}

// 🔥 Sabse pehle products load honge tabhi button kaam karenge
loadProducts();
</script>

<div id="quickOrderBox" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
        <h2 class="text-xl font-bold mb-2 text-red-600 border-b pb-2 text-left italic uppercase tracking-tighter">Quick Order</h2>
        <p id="selectedItemName" class="font-bold text-gray-700 mb-4 bg-gray-100 p-2 rounded-lg text-sm text-left"></p>
        
        <div class="space-y-3 text-left">
            <input id="qName" type="text" placeholder="Aapka Naam" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-red-500 text-black">
            <input id="qMobile" type="tel" placeholder="Mobile Number" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-red-500 text-black">
            <div class="grid grid-cols-2 gap-2">
                <input id="qSize" type="text" placeholder="Size (L, XL)" class="p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-red-500 text-black">
                <input id="qColor" type="text" placeholder="Color" class="p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-red-500 text-black">
            </div>
            <textarea id="qAddress" placeholder="Full Delivery Address" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none h-20 focus:border-red-500 text-black"></textarea>
        </div>

        <div class="flex gap-2 mt-6">
            <button onclick="document.getElementById('quickOrderBox').classList.add('hidden')" class="flex-1 py-3 font-bold text-gray-400">CANCEL</button>
            <button onclick="confirmQuickOrder()" class="flex-1 py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg border-b-4 border-green-800 active:translate-y-[2px] active:border-b-0 transition-all">CONFIRM ✅</button>
        </div>
    </div>
</div>
<div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 h-16 flex justify-around items-center z-[100] shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
    <div class="flex flex-col items-center text-red-600 cursor-pointer">
        <i class="fa-solid fa-house text-xl"></i>
        <span class="text-[10px] font-bold mt-0.5 uppercase">Home</span>
    </div>
    <div class="flex flex-col items-center text-gray-400 cursor-pointer" onclick="alert('Categories Coming Soon!')">
        <i class="fa-solid fa-layer-group text-xl"></i>
        <span class="text-[10px] font-bold mt-0.5 uppercase">Categories</span>
    </div>
    <div class="flex flex-col items-center text-gray-400 cursor-pointer" onclick="openOrder()">
        <i class="fa-solid fa-truck-fast text-xl"></i>
        <span class="text-[10px] font-bold mt-0.5 uppercase">Orders</span>
    </div>
    <div class="flex flex-col items-center text-gray-400 cursor-pointer">
        <i class="fa-solid fa-user text-xl"></i>
        <span class="text-[10px] font-bold mt-0.5 uppercase">Account</span>
    </div>
</div>

</body>
</html>
