<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#003399">

<title>NnCart Full</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
background:#f3f4f6;
font-family:sans-serif;
}

img{
background:#eee;
min-height:100px;
}

.no-scrollbar::-webkit-scrollbar{
display:none;
}

.no-scrollbar{
-ms-overflow-style:none;
scrollbar-width:none;
}

.line-clamp-2{
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.product-card:active{
transform:scale(.97);
}

</style>
</head>

<body class="pb-24">

<!-- HEADER -->

<header class="bg-[#003399] text-white p-4 sticky top-0 z-50 shadow-lg flex justify-between items-center">

<div onclick="location.reload()" class="cursor-pointer">

<h1 class="text-3xl font-black italic leading-none">
NnCart
</h1>

<p class="text-[9px] opacity-80">
Sab Kuch... Yahin Se!
</p>

</div>

<div class="flex items-center gap-4">

<i class="fa-solid fa-magnifying-glass text-xl"
onclick="document.getElementById('search').focus()"></i>

<div class="relative cursor-pointer"
onclick="toggleCart()">

<i class="fa-solid fa-cart-shopping text-2xl"></i>

<span id="cartCount"
class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] px-1.5 py-0.5 rounded-full">
0
</span>

</div>

</div>

</header>

<!-- SEARCH -->

<div class="bg-[#003399] p-3 rounded-b-[25px] shadow-md">

<div class="relative">

<input
id="search"
oninput="searchProduct()"
placeholder="Search Products..."
class="w-full p-3 rounded-xl pl-11 outline-none text-sm">

<i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-400"></i>

</div>

</div>

<!-- BANNER -->

<div class="p-3">

<div class="bg-gradient-to-r from-orange-500 via-red-600 to-pink-600 rounded-3xl p-5 shadow-xl text-white">

<p class="text-[11px] font-bold tracking-widest">
SPECIAL OFFER
</p>

<h2 class="text-3xl font-black italic leading-tight mt-1">
BIG SALE
</h2>

<div class="mt-3 inline-block bg-white text-red-600 px-4 py-1 rounded-full font-black text-sm">
UP TO 55% OFF
</div>

</div>

</div>

<!-- CATEGORY -->

<div class="flex gap-4 overflow-x-auto no-scrollbar px-4 py-2 bg-white">

<div onclick="filterByCategory('Saree')"
class="flex flex-col items-center min-w-[70px] cursor-pointer">

<img
src="https://m.media-amazon.com/images/I/71z3uD+6clL._AC_UY1100_.jpg"
class="w-16 h-16 rounded-full object-cover border">

<p class="text-[11px] font-bold mt-1">
Saree
</p>

</div>

<div onclick="filterByCategory('Kurti')"
class="flex flex-col items-center min-w-[70px] cursor-pointer">

<img
src="https://m.media-amazon.com/images/I/61vI80lYv+L._AC_UY1100_.jpg"
class="w-16 h-16 rounded-full object-cover border">

<p class="text-[11px] font-bold mt-1">
Kurti
</p>

</div>

<div onclick="filterByCategory('Jeans')"
class="flex flex-col items-center min-w-[70px] cursor-pointer">

<img
src="https://5.imimg.com/data5/ANDROID/Default/2021/1/WA/TC/ZZ/27725946/product-500x500.jpg"
class="w-16 h-16 rounded-full object-cover border">

<p class="text-[11px] font-bold mt-1">
Jeans
</p>

</div>

<div onclick="filterByCategory('Shirt')"
class="flex flex-col items-center min-w-[70px] cursor-pointer">

<img
src="https://m.media-amazon.com/images/I/71S9O6Ojc6L._AC_UY1100_.jpg"
class="w-16 h-16 rounded-full object-cover border">

<p class="text-[11px] font-bold mt-1">
Shirt
</p>

</div>

</div>

<!-- PRODUCTS -->

<div id="products"
class="grid grid-cols-2 gap-3 p-3">
</div>

<!-- CART -->

<div id="orderBox"
class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">

<div class="bg-white rounded-3xl w-full max-w-sm p-5 max-h-[90vh] overflow-y-auto">

<h2 class="font-black text-2xl mb-3 text-red-600">
Your Cart
</h2>

<div id="cartItems" class="space-y-2"></div>

<div class="border-t mt-4 pt-3">

<p class="flex justify-between font-black">

<span>Total</span>

<span id="total">₹0</span>

</p>

</div>

<div class="space-y-3 mt-4">

<input
id="cName"
placeholder="Your Name"
class="w-full p-3 border rounded-xl">

<input
id="mobile"
placeholder="Mobile Number"
class="w-full p-3 border rounded-xl">

<textarea
id="address"
placeholder="Full Address"
class="w-full p-3 border rounded-xl h-24"></textarea>

</div>

<div class="flex gap-2 mt-5">

<button
onclick="toggleCart()"
class="flex-1 py-3 rounded-xl bg-gray-200 font-bold">

Close

</button>

<button
onclick="submitOrder()"
class="flex-1 py-3 rounded-xl bg-blue-600 text-white font-bold">

Place Order

</button>

</div>

</div>

</div>

<!-- QUICK ORDER -->

<div id="quickOrderBox"
class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">

<div class="bg-white rounded-3xl w-full max-w-sm p-5">

<h2 class="text-2xl font-black text-green-600 mb-3">
Quick Order
</h2>

<p id="selectedItemName"
class="bg-gray-100 p-2 rounded-lg text-sm font-bold mb-4"></p>

<div class="space-y-3">

<input
id="qName"
placeholder="Your Name"
class="w-full p-3 border rounded-xl">

<input
id="qMobile"
placeholder="Mobile Number"
class="w-full p-3 border rounded-xl">

<div class="grid grid-cols-2 gap-2">

<input
id="qSize"
placeholder="Size"
class="p-3 border rounded-xl">

<input
id="qColor"
placeholder="Color"
class="p-3 border rounded-xl">

</div>

<textarea
id="qAddress"
placeholder="Full Address"
class="w-full p-3 border rounded-xl h-24"></textarea>

</div>

<div class="flex gap-2 mt-5">

<button
onclick="closeQuickOrder()"
class="flex-1 py-3 rounded-xl bg-gray-200 font-bold">

Cancel

</button>

<button
onclick="confirmQuickOrder()"
class="flex-1 py-3 rounded-xl bg-green-600 text-white font-bold">

Confirm

</button>

</div>

</div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {

apiKey:"AIzaSyCH2di4fAKw8vA80Cv8BMobi-v1p0I",

authDomain:"nncart.firebaseapp.com",

projectId:"nncart",

storageBucket:"nncart.firebasestorage.app",

messagingSenderId:"662993037031",

appId:"1:662993037031:web:893e379fe374cb74d26442"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let allProducts = [];

let cart = [];

let currentQuickItem = null;



async function loadProducts(){

try{

const snap =
await db.collection("products").get();

allProducts =
snap.docs.map(doc => ({
id:doc.id,
...doc.data()
}));

renderProducts(allProducts);

}catch(e){

console.log(e);

alert("Product Load Error");

}

}



function renderProducts(list){

const container =
document.getElementById("products");

if(!list.length){

container.innerHTML =
"<p>No Products Found</p>";

return;
}

let html = "";

list.forEach((p,index)=>{

const img =
p.Image ||
p.image ||
"https://via.placeholder.com/300";

const name =
p.Name ||
"Product";

const price =
p.Price ||
0;

html += `

<div class="bg-white rounded-2xl shadow-md overflow-hidden product-card">

<img
src="${img}"
class="w-full h-40 object-cover"
loading="lazy"
onerror="this.src='https://via.placeholder.com/300?text=No+Image'">

<div class="p-2">

<h2 class="text-[12px] font-bold line-clamp-2 min-h-[36px]">
${name}
</h2>

<p class="text-red-600 font-black text-lg mt-1">
₹${price}
</p>

<div class="flex gap-2 mt-2">

<button
onclick="buyNow(${index})"
class="flex-1 bg-yellow-400 py-2 rounded-lg text-[11px] font-black">

BUY NOW

</button>

<button
onclick="addToCart(${index})"
class="bg-[#003399] text-white px-3 rounded-lg">

<i class="fa-solid fa-cart-shopping"></i>

</button>

</div>

</div>

</div>

`;

});

container.innerHTML = html;

}



function searchProduct(){

const value =
document.getElementById("search")
.value
.toLowerCase();

const filtered =
allProducts.filter(p =>

(p.Name || "")
.toLowerCase()
.includes(value)

);

renderProducts(filtered);

}



function filterByCategory(cat){

const filtered =
allProducts.filter(p =>

(p.Category || "")
.toLowerCase()
.includes(cat.toLowerCase())

);

renderProducts(filtered);

}



function addToCart(index){

const p = allProducts[index];

const found =
cart.find(item =>
item.Name === p.Name
);

if(found){

found.qty += 1;

}else{

cart.push({
...p,
qty:1
});

}

updateCartUI();

}



function updateCartUI(){

document.getElementById("cartCount")
.innerText = cart.length;

let html = "";

let total = 0;

cart.forEach(item=>{

const qty = item.qty || 1;

const price = Number(item.Price || 0);

total += qty * price;

html += `

<div class="flex justify-between bg-gray-100 p-2 rounded-lg">

<div>

<p class="font-bold text-sm">
${item.Name}
</p>

<p class="text-xs">
Qty: ${qty}
</p>

</div>

<p class="font-black text-red-600">
₹${qty * price}
</p>

</div>

`;

});

document.getElementById("cartItems")
.innerHTML = html;

document.getElementById("total")
.innerText = "₹" + total;

}



function toggleCart(){

document.getElementById("orderBox")
.classList.toggle("hidden");

}



function buyNow(index){

currentQuickItem =
allProducts[index];

document.getElementById("selectedItemName")
.innerText =
currentQuickItem.Name;

document.getElementById("quickOrderBox")
.classList.remove("hidden");

}



function closeQuickOrder(){

document.getElementById("quickOrderBox")
.classList.add("hidden");

}



async function confirmQuickOrder(){

const data = {

Customer_Name:
document.getElementById("qName").value,

Mobile:
document.getElementById("qMobile").value,

Address:
document.getElementById("qAddress").value,

Size:
document.getElementById("qSize").value,

Color:
document.getElementById("qColor").value,

Product:
currentQuickItem.Name,

Price:
currentQuickItem.Price,

Status:"Pending",

Timestamp:
new Date().toISOString()

};

try{

await db.collection("orders").add(data);

alert("Order Success");

closeQuickOrder();

}catch(e){

console.log(e);

alert("Order Failed");

}

}



async function submitOrder(){

if(cart.length === 0){

alert("Cart Empty");

return;

}

const data = {

Customer_Name:
document.getElementById("cName").value,

Mobile:
document.getElementById("mobile").value,

Address:
document.getElementById("address").value,

Products:cart,

Total:
document.getElementById("total")
.innerText,

Status:"Pending",

Timestamp:
new Date().toISOString()

};

try{

await db.collection("orders").add(data);

alert("Order Success");

cart = [];

updateCartUI();

toggleCart();

}catch(e){

console.log(e);

alert("Order Failed");

}

}



loadProducts();

</script>

<!-- FOOTER -->

<footer class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3">

<button
onclick="location.reload()"
class="flex flex-col items-center text-red-600">

<i class="fa-solid fa-house text-xl"></i>

<span class="text-[10px] font-bold">
HOME
</span>

</button>

<button
onclick="window.scrollTo(0,0)"
class="flex flex-col items-center text-gray-500">

<i class="fa-solid fa-layer-group text-xl"></i>

<span class="text-[10px] font-bold">
TOP
</span>

</button>

<button
onclick="toggleCart()"
class="flex flex-col items-center text-gray-500">

<i class="fa-solid fa-cart-shopping text-xl"></i>

<span class="text-[10px] font-bold">
CART
</span>

</button>

<button
onclick="alert('Profile Coming Soon')"
class="flex flex-col items-center text-gray-500">

<i class="fa-solid fa-user text-xl"></i>

<span class="text-[10px] font-bold">
ACCOUNT
</span>

</button>

</footer>

</body>
</html>
